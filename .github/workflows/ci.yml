on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest behave allure-pytest pyserial

      - name: Run tests (mock mode)
        run: |
          PYTHONPATH=. pytest -q --maxfail=1 --disable-warnings --alluredir=reports

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports
